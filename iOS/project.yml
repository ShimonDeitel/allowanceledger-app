name: AllowanceLedger
options:
  bundleIdPrefix: com.shimondeitel.allowanceledger
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  AllowanceLedger:
    type: application
    platform: iOS
    sources:
      - path: AllowanceLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allowanceledger
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: AllowanceLedger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AllowanceLedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AllowanceLedgerTests
      - path: AllowanceLedger.storekit
    dependencies:
      - target: AllowanceLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allowanceledger.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  AllowanceLedgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AllowanceLedgerUITests
    dependencies:
      - target: AllowanceLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allowanceledger.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  AllowanceLedger:
    build:
      targets:
        AllowanceLedger: all
        AllowanceLedgerTests: [test]
        AllowanceLedgerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: AllowanceLedger.storekit
    test:
      config: Debug
      storeKitConfiguration: AllowanceLedger.storekit
      targets:
        - AllowanceLedgerTests
        - AllowanceLedgerUITests
    archive:
      config: Release
